
services:
  # 1. La Base de données
  db:
    image: postgres:15-alpine
    container_name: emploi_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Le Broker de messages (Redis)
  redis:
    image: redis:7-alpine
    container_name: emploi_redis
    ports:
      - "6379:6379"

  # 3. L'API Flask (Backend)
  api:
    build: .
    container_name: emploi_api
    command: python -m api.app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. Le Worker Celery 
  celery_worker:
    build: .
    container_name: emploi_celery_worker
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
    volumes:
      - ./scraper/raw_data:/app/scraper/raw_data
    depends_on:
      - api
      - redis

  # 5. Le Planificateur Automatique (Niveau Or)
  celery_beat:
    build: .
    container_name: emploi_celery_beat
    command: celery -A tasks.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker

  # 6. Monitoring avec Prometheus et Grafana
  prometheus:
    image: prom/prometheus:latest
    container_name: emploi_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: emploi_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# Définition des volumes persistants
volumes:
  postgres_data:
  scraper_data:
  